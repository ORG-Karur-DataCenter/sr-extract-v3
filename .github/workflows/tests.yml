name: tests
on: [push, pull_request]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system deps (for PyMuPDF)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libmupdf-dev
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pytest
        env:
          GEMINI_API_KEYS: ""
          CLAUDE_API_KEY: ""
        run: pytest tests/ -v
